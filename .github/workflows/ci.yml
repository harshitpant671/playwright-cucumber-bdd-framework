name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20" # Node 20 is the current LTS and recommended
          cache: "npm"

      - name: Install dependencies
        run: npm ci # 'npm ci' is cleaner for CI environments than 'npm install'

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium # Installs chromium and needed OS libs

      - name: Run tests
        run: npx cucumber-js # Standard command for cucumber

      - name: Upload Report
        if: always() # Ensures reports are uploaded even if tests fail
        uses: actions/upload-artifact@v4
        with:
          name: playwright-reports
          path: reports/
          retention-days: 30
